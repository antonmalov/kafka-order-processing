apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: order-processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: anton230230/order-service:latest
        env:
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: SERVER_PORT
          value: "8081"
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: order-processing
spec:
  selector:
    app: order-service
  ports:
  - port: 8081
    targetPort: 8081